{% set name = "baycomp" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 32b25ad7b16d5b251ddb9f6110a32d7b3953b987096da1d25ef277935d25daec

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - wheel
    - setuptools
  run:
    - python
    - matplotlib-base >=2.1.2
    - numpy >=1.13.1
    - scipy >=0.19.1
  run_constrained:
    - pystan >=3.4.0

test:
  source_files:
    - tests
  imports:
    - baycomp
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests
  requires:
    - pip
    - pytest

about:
  home: https://github.com/janezd/baycomp
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Library for Bayesian comparison of predictive models
  description: |
    A library for comparing results of predictive models on single
    or multiple data sets using Bayesian approaches. The libary is
    in pure Python, and depends on numpy, scipy and matplotlib.
    The more advanced hierarchical tests require pystan, which needs
    to be installed separately.
  doc_url: https://baycomp.readthedocs.io
  dev_url: https://github.com/janezd/baycomp

extra:
  recipe-maintainers:
    - janezd
